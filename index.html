<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes">
    <title>Speedyfingers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12L18.3431 17.6569L16.9289 16.2426L21.1716 12L16.9289 7.75736L18.3431 6.34315L24 12ZM2.82843 12L7.07107 16.2426L5.65685 17.6569L0 12L5.65685 6.34315L7.07107 7.75736L2.82843 12ZM9.78845 21H7.66009L14.2116 3H16.3399L9.78845 21Z"></path></svg>
            Speedyfingers
        </h1>
        <div id="header">
            <div id="info"></div>
            <div class="timer">
                <button>15</button>
                <button>30</button>
                <button>45</button>
                <button>60</button>
            </div>
            <div id="buttons">
                <button id="newGameBtn">New game</button>
            </div>
        </div>
        <div id="game" tabindex="0">
            <div id="words"></div>
            <div id="cursor"></div>
            <div id="focus-error">Click here to focus</div>
        </div>
        <div class="result">
            <div class="wpm">Words Per Minute :</div>
            <div class="accuracy">Accuracy :</div>
        </div>
    </main>
    <script src="typing.js"></script>
</body>
</html>
